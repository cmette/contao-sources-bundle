tl_sources_entity:
  source_not_found: Die referenzierte Quelle existiert nicht oder wurde gelöscht.

  type_legend: Art der Quelle
  type:
    - Quellen-Typ
    - Bitte wählen Sie hier die Art der Quelle
  type_options:
    monograph:
      - Monografie
      - Monografien
    series:
      - Reihe
      - Reihen
    anthology:
      - Sammelband
      - Sammelbände
    essay:
      - Aufsatz
      - Aufsätze
    periodicals:
      - Zeitschrift
      - Zeitschriften
    onlinesource:
      - online-Quelle (URL, URN, DOI etc.)
      - online-Quellen
    map:
      - Landkarte, Riss, Skizze, Grafik
      - Karten/Risse/Skizzen etc.
    handwriting:
      - Handschrift
      - Handschriften
    photography:
      - Fotografie
      - Fotografien

  author_legend: AutorInnen und HerausgeberInnen
  authors_hint: Die Autorinnen und Autoren sollte hier in der Reihenfolge wie im Einband angegeben erfasst werden.
  without_authors: ohne Autor
  authors:
    - Autoren und Autorinnen
    - Erfassen Sie hier die AutorInnen mit ihren Rollen. Wenn die gesuchten Personen nicht vorhanden sind, ergänzen Sie diese bitte im Register.
  authors_fields:
    author:
      - Autor/Autorin
      - Wählen Sie hier den Autor / die Autorin aus der Liste.
    role:
      - als (Eigenschaft)
      - Wählen Sie hier die Rolle, in der publiziert wurde.
    role_options:
      isPublisher: "[Hrsg.]"
      isCoAuthor: "[Mitw.]"
      isContributor: "[Mitarb.]"
  etal:
    - et al. verwenden
    - Bei mehr als 2 AutorInnen wird nur der/die erste AutorIn genannt und et al. ergänzt.
    - et al.

  title_legend: Titel der Publikation
  title:
    - Titel der Publikation
    - Geben Sie hier den Titel der Publikation ein.
  subtitle:
    - Untertitel (optional)
    - Geben Sie hier einen Untertitel ein.

  series_legend: Angaben zur Reihe oder einem Periodikum
  addSeries:
    - Reihe
    - Aktivieren Sie diese Option, wenn der Titel in einer Reihe erschienen ist.
  series:
    - "Reihe"
    - Wählen Sie hier das Periodikum aus. Erfassen Sie fehlende Periodika unter Periodika
  volume_title:
    - Bandtitel (optional)
    - Geben Sie hier den Titel des Bandes oder der Ausgabe ein. Die Angabe ist optional.
  volume:
    - Band
    - Geben Sie hier die Bandnummer ein.
  issue:
    - Heft-Nr. / Ausgabe
    - Geben Sie hier die Heft-Nummer oder die Nummer der Ausgabe ein.

  publisher_legend: Ort und Verlag
  publisher:
    - "Ort und Verlag"
    - Wählen Sie hier den Verlag. Erfassen Sie fehlende Verlage unter Verlage.
  edition:
    - zitierte Auflage
    - Geben Sie hier die Auflage ein, aus der Sie zitiert haben.
  year:
    - Jahr zitierte Auflage
    - Geben Sie hier das Erscheinungsjahr für die zitierte Auflage ein.
  without_year: o D. # gemäß APA 6
  firstyear:
    - Jahr Erstauflage
    - Geben Sie hier das Jahr der Erstauflage ein.

  catalogs_legend: Die Quelle in einschlägigen Katalogen
  addCatalogs:
    - Einen oder mehrere Katalogverweise hinzufügen
    - Erfassen Sie hier Verweise auf einschlägige Bibliothekskataloge.
  catalogs:
    - Katalog
    - Erfassen Sie hier Verweise auf einschlägige Bibliothekskataloge.
  catalog_fields:
      provider:
        - Katalog
      signature:
        - Signatur
      url:
        - URL/URN
      date:
        - Datum des Abrufs

  digitalcopies_legend: Die Quelle als Digitalisat
  addDigitalCopies:
    - Ein oder mehrere Digitalisate hinzufügen
    - Aktivieren Sie diese Funktion, um ein oder mehrere Verweise auf Digitalisate zu erfassen. Das Digitalisat selbst wird hier nicht gespeichert.
  digitalcopies:
    - Digitalisate
    - Erfassen Sie hier Verweise auf verfügbare Digitalisate.
  digitalcopies_fields:
    provider:
      - Datengeber
    url:
      - URL
    date:
      - Datum des Abrufs

  image_legend: Symbolbild für die Quelle
  addImage:
    - Ein Symbolbild hinzufügen
    - Aktivieren Sie diese Funktion, um ein Bild für die Quelle anzuzeigen.
  singleSRC:
    - Datei auswählen
    - Wählen Sie
  fullsize:
    - Großansicht aktivieren
    - Großansicht des Bildes in einer Lightbox bzw. den Link in einem neuen Browserfenster öffnen.
  size:
    - Bildgrößen
    - Hier können Sie die Abmessungen des Bildes und den Skalierungsmodus festlegen.
  floating:
    - Bildausrichtung
    - Bitte legen Sie fest, wie das Bild ausgerichtet werden soll.
  overwriteMetaFromSource:
    - Metadaten der Quelle verwenden
    - Wenn Sie diese Option aktivieren, so werden die Metadaten des Bildes aus der Quelle selbst erzeugt. Das ist genauer und spart die zusätzliche Datenerfassung am Bild, da die Angaben in der Quelle immer umfangreicher und genauer sind. Sie können die hier anzuzeigenden Daten in den Konfigurationseinstellungen auswählen.